name: E2E Tests

on:
  push:
    branches: ['*']
  pull_request:
    branches: ['*']

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Compile TypeScript
        run: npm run build

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      # Check out the API repo to spin it up with Docker
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/propeller-sdet-task-daniel-kostoski
          path: api

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install test dependencies
        run: npm ci

      - name: Start API with Docker Compose
        working-directory: api
        run: docker compose up -d --build

      - name: Wait for API to be ready
        run: |
          echo "Waiting for GraphQL API..."
          for i in $(seq 1 30); do
            if curl -sf -X POST http://localhost:3000/graphql \
              -H "Content-Type: application/json" \
              -H "x-tenant-id: health" \
              -d '{"query":"{ __typename }"}' > /dev/null 2>&1; then
              echo "API is ready!"
              break
            fi
            echo "Attempt $i/30 - waiting 5s..."
            sleep 5
          done

      - name: Seed database
        working-directory: api
        run: docker compose run --rm seed

      - name: Run E2E tests
        run: npm test

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: reports/
          retention-days: 14

      - name: Stop API
        if: always()
        working-directory: api
        run: docker compose down -v